spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  flyway:
    schemas: ${FLYWAY_SCHEMAS:public}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}

jwt:
  secret: ${JWT_SECRET}
  access-expiration: ${JWT_ACCESS_EXPIRATION:3600000}

app:
  test-users:
    enabled: ${TEST_USERS_ENABLED:false}
  razorpay:
    key-id: ${RAZORPAY_KEY_ID}
    key-secret: ${RAZORPAY_KEY_SECRET}
    account-number: ${RAZORPAY_ACCOUNT_NUMBER:}
    withdrawal-paise-per-chip: ${RAZORPAY_WITHDRAWAL_PAISE_PER_CHIP:1}

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
